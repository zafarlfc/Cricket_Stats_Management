<div class="container mt-4">
    <h2>Players</h2>

    <p *ngIf="loading">Loading...</p>

    <div *ngFor="let player of players" class="card mb-3">
        <div class="card-body">
            <h5>{{player.name}}</h5>
            <p>{{player.country}}</p>
            <p>Runs: {{player.runs}} | Wickets: {{player.wickets}}</p>
            <p>⭐ {{player.average_rating}}</p>

            <a [routerLink]="['/player', player.id]" class="btn btn-primary">
                View Details
            </a>
        </div>
    </div>
</div>
