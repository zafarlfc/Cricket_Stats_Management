<div class="container mt-4">
    <h2>Login Page Loaded</h2>

    <input [(ngModel)]="username" class="form-control mb-2" placeholder="Username">
    <input [(ngModel)]="password" type="password" class="form-control mb-2" placeholder="Password">

    <button class="btn btn-primary" (click)="login()">Login</button>

    <p class="text-danger mt-2" *ngIf="error">{{error}}</p>
</div>
